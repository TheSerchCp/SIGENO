<template id="login-template">
    <div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-purple-500 via-purple-600 to-pink-500 dark:from-gray-800 dark:via-gray-900 dark:to-gray-950">
        <div class="w-full max-w-md p-8 bg-white dark:bg-gray-900 rounded-lg shadow-2xl">
            <h1 class="text-3xl font-bold text-center mb-8 text-gray-800 dark:text-white">Iniciar sesión</h1>

            <app-form id="loginForm">
                <!-- Email Input -->
                <div slot="fields" class="mb-6">
                    <input-component 
                        id="emailInput"
                        type="email" 
                        placeholder="correo@example.com"
                        required
                        name="email"
                        label="Email"
                        class="w-full"
                    ></input-component>
                </div>

                <!-- Password Input -->
                <div slot="fields" class="mb-6">
                    <input-component 
                        id="passwordInput"
                        type="password" 
                        placeholder="Tu contraseña"
                        required
                        name="password"
                        label="Contraseña"
                        class="w-full"
                    ></input-component>
                </div>

                <!-- Submit Button -->
                <div slot="fields">
                    <app-button 
                        id="submitBtn"
                        variant="primary" 
                        size="md"
                        text="Entrar"
                        class="w-full"
                    ></app-button>
                </div>
            </app-form>
        </div>
    </div>
</template>
