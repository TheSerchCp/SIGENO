<template id="input-template">
  <div class="input-wrapper">
    <label id="label" class="block text-sm font-semibold text-gray-700 dark:text-gray-400 mb-2"></label>
    <div class="flex justify-start items-center relative">
      <input id="input-field" type="text" class="">
      <li id="icon-field"></li>
      <button id="password-toggle" type="button" style="display: none;" class="absolute right-3 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 bg-transparent border-none cursor-pointer p-1">
        <i class="fas fa-eye"></i>
      </button>
    </div>
    <slot name="error"></slot>
  </div>
</template>

<template id="checkbox-template">
  <div class="checkbox-wrapper" id="checkbox-wrapper">
    <label id="checkbox-label" class="flex items-center gap-2 cursor-pointer">
      <input id="checkbox-field" type="checkbox" class="checkbox-input">
      <span id="checkbox-text" class="text-sm text-gray-700 dark:text-gray-300"></span>
    </label>
    <slot name="error"></slot>
  </div>
</template>

<template id="radio-template">
  <div class="radio-wrapper" id="radio-wrapper">
    <label id="radio-label" class="flex items-center gap-2 cursor-pointer">
      <input id="radio-field" type="radio" class="radio-input">
      <span id="radio-text" class="text-sm text-gray-700 dark:text-gray-300"></span>
    </label>
    <slot name="error"></slot>
  </div>
</template>
